# Fly.io configuration for md2pdf E-Library
# Deploy with: fly launch && fly deploy

app = "md2pdf"
primary_region = "iad"  # Washington DC - change to nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  ADAPTER_PROVIDER = "supabase"
  AUTH_ENABLED = "true"
  PORT = "9990"

[http_service]
  internal_port = 9990
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  protocol = "tcp"
  internal_port = 9990

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = 10000
    grace_period = "5s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = 2000
